[build]
  command = "echo \"KEYSTATIC_GITHUB_CLIENT_ID=$KEYSTATIC_GITHUB_CLIENT_ID\nKEYSTATIC_GITHUB_CLIENT_SECRET=$KEYSTATIC_GITHUB_CLIENT_SECRET\nKEYSTATIC_SECRET=$KEYSTATIC_SECRET\" > .env && npm run build:cms"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Ensure Netlify Functions can access env vars
[functions]
  node_bundler = "esbuild"
  included_files = []

[[plugins]]
  package = "netlify-plugin-inline-functions-env"